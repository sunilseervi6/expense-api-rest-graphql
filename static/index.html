<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simple and Clean Expense Tracker Dashboard.">
  <title>Expense Tracker</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- External Stylesheet served via FastAPI static mount -->
  <link rel="stylesheet" href="/static/styles.css">
  <!-- External JavaScript script served via FastAPI static mount -->
  <script src="/static/app.js" defer></script>
</head>
<body>

  <div class="container">
    <header>
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </div>
      <h1>Expense Tracker</h1>
    </header>

    <div class="grid-container">
      <!-- Left Column containing Forms -->
      <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        
        <!-- Add/Edit Expense Form Card -->
        <div class="card">
          <h2 class="card-title" id="expense-form-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.25rem;">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
            Add New Expense
          </h2>
          <form id="expense-form">
            <div class="form-group">
              <label for="amount">Amount ($)</label>
              <input type="number" step="0.01" id="amount" placeholder="e.g. 45.00" required>
            </div>
            
            <div class="form-group">
              <label for="description">Description</label>
              <input type="text" id="description" placeholder="e.g. Grocery items" required>
            </div>

            <div class="form-group">
              <label for="spent-on">Date</label>
              <input type="date" id="spent-on" required>
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" required>
                <option value="" disabled selected>Loading categories...</option>
              </select>
            </div>

            <div style="display: flex; gap: 1rem;">
              <button type="submit" id="submit-btn" style="flex: 1;">
                Save Expense
              </button>
              <button type="button" id="cancel-edit-btn" style="display: none; background: #334155; color: var(--text-secondary); border: 1px solid var(--border-color); flex: 0.5;" onclick="cancelEditExpense()">
                Cancel
              </button>
            </div>
          </form>
        </div>

        <!-- Add Category Form Card -->
        <div class="card">
          <h2 class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.25rem;">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            Add New Category
          </h2>
          <form id="category-form">
            <div class="form-group">
              <label for="category-name">Category Name</label>
              <input type="text" id="category-name" placeholder="e.g. Health" required>
            </div>
            <button type="submit" id="category-submit-btn">
              Save Category
            </button>
          </form>
          
          <div style="margin-top: 1.25rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
            <h3 style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem;">Manage Categories</h3>
            <div id="manage-categories-list" style="display: flex; flex-wrap: wrap; gap: 0.4rem;">
              <!-- Categories list loaded dynamically -->
            </div>
          </div>
        </div>

      </div>

      <!-- Right Column containing Summary -->
      <div class="card">
        <div class="summary-header">
          <h2 class="card-title" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.25rem;">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            Monthly Summary
          </h2>
          <div class="month-picker-container">
            <input type="month" id="summary-month">
          </div>
        </div>
        
        <div class="total-spend-display">
          <div class="total-spend-label">Total Spend</div>
          <div class="total-spend-value" id="total-spend-value">$0.00</div>
        </div>

        <div class="category-breakdown-list" id="category-breakdown-list">
          <!-- Loaded dynamically -->
        </div>
      </div>
    </div>

    <!-- Ledger Table Card -->
    <div class="card">
      <h2 class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.25rem;">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        Expense Ledger
      </h2>
      <div class="table-container">
        <table id="expenses-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Category</th>
              <th class="amount-header">Amount</th>
              <th style="text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody id="expenses-table-body">
            <tr>
              <td colspan="5" class="empty-state">Loading expenses...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

</body>
</html>
